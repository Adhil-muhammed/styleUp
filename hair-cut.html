<!doctype html>
<html class="dark" lang="en" style="">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <style>
      body {
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .radio-pulse {
        box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.4);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(124, 58, 237, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(124, 58, 237, 0);
        }
      }
      .service-card-active {
        border-color: #7c3aed !important;
        background: linear-gradient(145deg, #1b1b20, #251b3a);
      }
    </style>
  </head>
  <body class="bg-background text-on-surface min-h-screen pb-32">
    <!-- TopAppBar (Based on Shared Components JSON) -->
    <header
      class="sticky top-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant flex justify-between items-center px-container-margin py-stack-md w-full"
    >
      <div class="flex items-center gap-4">
        <button
          class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="font-headline font-bold text-2xl text-on-surface">
          Haircut
        </h1>
      </div>
    </header>
    <main class="max-w-md mx-auto px-container-margin mt-stack-lg">
      <!-- Segmented Control (Category Header) -->
      <div
        class="flex p-1 bg-surface-container rounded-xl border border-surface-variant mb-section-gap"
      >
        <button
          class="flex-1 py-3 px-4 rounded-lg text-sm font-bold transition-all duration-300 bg-primary-container text-on-primary-container shadow-lg"
          id="tab-man"
          onclick="switchTab('man')"
        >
          Man
        </button>
        <button
          class="flex-1 py-3 px-4 rounded-lg text-sm font-bold transition-all duration-300 text-on-surface-variant hover:text-on-surface"
          id="tab-woman"
          onclick="switchTab('woman')"
        >
          Woman
        </button>
      </div>
      <!-- Service List -->
      <div class="space-y-gutter" id="service-list">
        <!-- Service Card 1 -->
        <div

          onclick="selectService(this)"
        >
          <div
            class="w-20 h-20 shrink-0 overflow-hidden rounded-lg mr-4 border border-outline-variant"
          >
            <img
              class="w-full h-full object-cover"
              data-alt="A high-definition studio shot of a professional undercut haircut on a male model. The hair is impeccably styled with a matte finish, featuring a clean fade on the sides and long volume on top. The lighting is cool-toned with purple highlights, reflecting a modern and premium barbershop environment."
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaEwkbMk-Lvz2dVjyUrZZocClB-daJJK1zON6b3Qbk_U0Bl8xJs5bcBRcAOPTU2c9E6_dVg_XWPfHzwGC_gWKoAqUB5bIZfTvBis_56sz48WGX7fNTVr8BHIT7_i00QgkeZH-xaFSvcvuuGZ0LDDF4ywGu4nnixoOUzPrGuny_60aODBCrugy90x4-8kk2Hv-y2FgehhfOzdDOqk3WE1keKHJVlAqlJsybFY4M6R6wSE6fVtNXY0WAMgGvdRv2DDFrz02kSvZTr_s"
            />
          </div>
          <div class="flex-1">
            <h3 class="font-headline font-bold text-lg text-on-surface">
              Undercut
            </h3>
            <p
              class="text-sm text-on-surface-variant flex items-center gap-1 mt-0.5"
            >
              <span class="material-symbols-outlined text-[14px]"
                >trending_up</span
              >
              728 booked
            </p>
            <p class="text-xl font-bold text-secondary mt-1">$45.00</p>
          </div>
          <div
            class="radio-circle w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors flex items-center justify-center"
          >
            <div
              class="inner-dot w-3 h-3 bg-primary rounded-full opacity-0 transition-opacity"
            ></div>
          </div>
        </div>
        <!-- Service Card 2 (Active) -->
        <div
          class="group relative flex items-center p-4 bg-surface-container-low border border-primary rounded-xl cursor-pointer service-card-active transition-all duration-300"
          onclick="selectService(this)"
        >
          <div
            class="w-20 h-20 shrink-0 overflow-hidden rounded-lg mr-4 border border-primary/30"
          >
            <img
              class="w-full h-full object-cover"
              data-alt="A detailed view of a classic quiff hairstyle on a young man, styled with precision and high-shine pomade. The setting is a luxury midnight-themed barbershop with neon violet accent lighting. The photo is sharp, emphasizing the texture of the hair and the expert craftsmanship of the cut."
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPpQOyObH0DxTDEDAuK3BA5dycrEfytQ3K-LSv4RpM36Il5r3kMxeICXlryR9F32_4UCttDnY1bmZYXsXP2fGIkd-Ud-79tgu6LtI9PYAYXPQ_fhcFne0zeLQNXqgIOYq0OCFJ3ESkY-srwgvdwecKaST48dhpxHfQ1Ca4LxnUhL_lWlaKNyE5DU-zK2hwQ56Aw24NFLRpPfGYrWbtU8VTDcPnDfCg1BqPsay7GmGDMSy2dJuMzzLUD52PDgObO3f9dAV4ocD9smE"
            />
          </div>
          <div class="flex-1">
            <h3 class="font-headline font-bold text-lg text-on-surface">
              Quiff
            </h3>
            <p
              class="text-sm text-on-surface-variant flex items-center gap-1 mt-0.5"
            >
              <span class="material-symbols-outlined text-[14px]"
                >trending_up</span
              >
              629 booked
            </p>
            <p class="text-xl font-bold text-secondary mt-1">$42.00</p>
          </div>
          <div
            class="radio-circle w-6 h-6 rounded-full border-2 border-primary radio-pulse flex items-center justify-center"
          >
            <div
              class="inner-dot w-3 h-3 bg-primary rounded-full opacity-100"
            ></div>
          </div>
        </div>
        <!-- Service Card 3 -->
        <div
          class="group relative flex items-center p-4 bg-surface-container-low border border-surface-variant rounded-xl cursor-pointer hover:border-primary/50 transition-all duration-300"
          onclick="selectService(this)"
        >
          <div
            class="w-20 h-20 shrink-0 overflow-hidden rounded-lg mr-4 border border-outline-variant"
          >
            <img
              class="w-full h-full object-cover"
              data-alt="A clean and precise crew cut haircut on a male model, showcasing sharp lines and a perfect transition. The image is captured in a high-contrast style with dark shadows and vibrant violet highlights, creating a tech-focused and masculine aesthetic. The background is a blurred dark interior of an upscale grooming lounge."
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfoknFoBlFzHIyDAdYrrLwHGsTNBgH10FVZOMK4mtaReZ2kdR33mrpdPejbgypz0dG2uzfR-_NEBU4UraQk7P_kq67bNWGGV58Jvsk6NFOXdMvNwvg7faQtBo0OT4pbJQDJzXStJmQJK_6RboVgQoOQcZHJ0oFdBMgE_b4wLer8KUc7Ckofzu7HzHIWerEZMb-ncQt2XzxqtLq-Rum6hFZwF4DfcO_UIkdW7IyUMjf70XtTjzgyEIdCMRCmUEJ22btpS53rt6KVrc"
            />
          </div>
          <div class="flex-1">
            <h3 class="font-headline font-bold text-lg text-on-surface">
              Crew Cut
            </h3>
            <p
              class="text-sm text-on-surface-variant flex items-center gap-1 mt-0.5"
            >
              <span class="material-symbols-outlined text-[14px]"
                >trending_up</span
              >
              922 booked
            </p>
            <p class="text-xl font-bold text-secondary mt-1">$38.50</p>
          </div>
          <div
            class="radio-circle w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors flex items-center justify-center"
          >
            <div
              class="inner-dot w-3 h-3 bg-primary rounded-full opacity-0 transition-opacity"
            ></div>
          </div>
        </div>
        <!-- Service Card 4 -->
        <div
          class="group relative flex items-center p-4 bg-surface-container-low border border-surface-variant rounded-xl cursor-pointer hover:border-primary/50 transition-all duration-300"
          onclick="selectService(this)"
        >
          <div
            class="w-20 h-20 shrink-0 overflow-hidden rounded-lg mr-4 border border-outline-variant"
          >
            <img
              class="w-full h-full object-cover"
              data-alt="A professional regular cut hairstyle, featuring a timeless and versatile look. The lighting uses soft amber and deep violet tones to emphasize depth and structure. The setting is a minimalist, modern barbershop with sleek black furniture and metallic accents, aligning with a high-end urban lifestyle brand."

            />
          </div>
          <div class="flex-1">
            <h3 class="font-headline font-bold text-lg text-on-surface">
              Regular Cut
            </h3>
            <p
              class="text-sm text-on-surface-variant flex items-center gap-1 mt-0.5"
            >
              <span class="material-symbols-outlined text-[14px]"
                >trending_up</span
              >
              1,029 booked
            </p>
            <p class="text-xl font-bold text-secondary mt-1">$35.00</p>
          </div>
          <div
            class="radio-circle w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors flex items-center justify-center"
          >
            <div
              class="inner-dot w-3 h-3 bg-primary rounded-full opacity-0 transition-opacity"
            ></div>
          </div>
        </div>
      </div>
    </main>
    <!-- Floating Bottom Action -->
    <div
      class="fixed bottom-0 left-0 w-full p-container-margin bg-surface/90 backdrop-blur-xl border-t border-outline-variant z-40"
    >
      <div class="max-w-md mx-auto flex gap-4 items-center">
        <div class="hidden sm:block">
          <p class="text-xs text-outline uppercase font-bold">Total Estimate</p>
          <p class="text-lg font-bold text-on-surface">$42.00</p>
        </div>
        <button
          class="flex-1 bg-primary-container text-on-primary-container py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-95 transition-all duration-200"
        >
          Apply Selection
        </button>
      </div>
    </div>
    <script>
      function switchTab(gender) {
        const manTab = document.getElementById("tab-man");
        const womanTab = document.getElementById("tab-woman");

        if (gender === "man") {
          manTab.classList.add(
            "bg-primary-container",
            "text-on-primary-container",
            "shadow-lg",
          );
          manTab.classList.remove("text-on-surface-variant");
          womanTab.classList.remove(
            "bg-primary-container",
            "text-on-primary-container",
            "shadow-lg",
          );
          womanTab.classList.add("text-on-surface-variant");
        } else {
          womanTab.classList.add(
            "bg-primary-container",
            "text-on-primary-container",
            "shadow-lg",
          );
          womanTab.classList.remove("text-on-surface-variant");
          manTab.classList.remove(
            "bg-primary-container",
            "text-on-primary-container",
            "shadow-lg",
          );
          manTab.classList.add("text-on-surface-variant");
        }
      }

      function selectService(element) {
        // Remove active state from all cards
        const cards = document.querySelectorAll("#service-list > div");
        cards.forEach((card) => {
          card.classList.remove("service-card-active", "border-primary");
          card.classList.add("border-surface-variant");

          const radio = card.querySelector(".radio-circle");
          radio.classList.remove("border-primary", "radio-pulse");
          radio.classList.add("border-outline-variant");

          const dot = card.querySelector(".inner-dot");
          dot.classList.add("opacity-0");
          dot.classList.remove("opacity-100");
        });

        // Add active state to clicked card
        element.classList.add("service-card-active", "border-primary");
        element.classList.remove("border-surface-variant");

        const radio = element.querySelector(".radio-circle");
        radio.classList.add("border-primary", "radio-pulse");
        radio.classList.remove("border-outline-variant");

        const dot = element.querySelector(".inner-dot");
        dot.classList.remove("opacity-0");
        dot.classList.add("opacity-100");
      }
    </script>
  </body>
</html>
