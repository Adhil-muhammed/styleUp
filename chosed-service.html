<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Clipd - Our Services</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              "midnight-bg": "#131318",
              "midnight-surface": "#1b1b20",
              "midnight-border": "#39383e",
              "brand-violet": "#7c3aed",
              "brand-amber": "#f59e0b",
            },
            borderRadius: {
              custom: "8px",
            },
          },
        },
      };
    </script>
    <style data-purpose="custom-styling">
      body {
        background-color: #131318;
        color: #ffffff;
        -webkit-tap-highlight-color: transparent;
      }
      /* Custom scrollbar for mobile feel */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      .service-card-selected {
        border: 1px solid #f59e0b;
      }
      .service-card-unselected {
        border: 1px solid #39383e;
      }
      .safe-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <!-- BEGIN: Mobile Container -->
    <div
      class="flex flex-col min-h-screen max-w-md mx-auto relative overflow-hidden"
    >
      <!-- BEGIN: Header -->
      <header
        class="flex items-center justify-between px-6 py-8"
        data-purpose="main-header"
      >
        <div class="flex items-center gap-4">
          <button
            aria-label="Go back"
            class="w-10 h-10 flex items-center justify-center rounded-full bg-midnight-surface border border-midnight-border"
          >
            <svg
              fill="none"
              height="20"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              viewbox="0 0 24 24"
              width="20"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
          <h1 class="text-2xl font-bold tracking-tight">Our Services</h1>
        </div>
        <button
          aria-label="More options"
          class="w-10 h-10 flex items-center justify-center rounded-full bg-midnight-surface border border-midnight-border"
        >
          <svg
            fill="none"
            height="20"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            viewbox="0 0 24 24"
            width="20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="19" cy="12" r="1"></circle>
            <circle cx="5" cy="12" r="1"></circle>
          </svg>
        </button>
      </header>
      <!-- END: Header -->
      <!-- BEGIN: Services List -->
      <main class="flex-1 px-6 space-y-4 pb-32" data-purpose="services-list">
        <!-- SELECTED: Hair Cut -->
        <div
          class="service-card-selected bg-midnight-surface p-6 rounded-custom flex justify-between items-center"
          data-purpose="service-item"
        >
          <div class="flex flex-col">
            <span class="text-gray-400 font-medium">Hair Cut</span>
          </div>
          <div class="flex items-center gap-3 text-right">
            <div class="flex flex-col">
              <span class="font-bold text-white text-lg">Quiff</span>
              <span class="text-brand-amber font-bold">+ $6.00</span>
            </div>
            <svg
              class="text-brand-amber"
              fill="currentColor"
              height="18"
              viewbox="0 0 24 24"
              width="18"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="m9 18 6-6-6-6v12z"></path>
            </svg>
          </div>
        </div>
        <!-- UNSELECTED: Hair Coloring -->
        <div
          class="service-card-unselected bg-midnight-surface p-6 rounded-custom flex justify-between items-center"
          data-purpose="service-item"
        >
          <span class="text-gray-400 font-medium">Hair Coloring</span>
          <div class="flex items-center gap-3">
            <span class="font-bold text-white">12 types</span>
            <svg
              class="text-brand-amber"
              fill="currentColor"
              height="18"
              viewbox="0 0 24 24"
              width="18"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="m9 18 6-6-6-6v12z"></path>
            </svg>
          </div>
        </div>
        <!-- SELECTED: Hair Wash -->
        <div
          class="service-card-selected bg-midnight-surface p-6 rounded-custom flex justify-between items-center"
          data-purpose="service-item"
        >
          <div class="flex flex-col">
            <span class="text-gray-400 font-medium">Hair Wash</span>
          </div>
          <div class="flex items-center gap-3 text-right">
            <div class="flex flex-col">
              <span class="font-bold text-white text-lg"
                >Aloe Vera Shampoo</span
              >
              <span class="text-brand-amber font-bold">+ $5.50</span>
            </div>
            <svg
              class="text-brand-amber"
              fill="currentColor"
              height="18"
              viewbox="0 0 24 24"
              width="18"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="m9 18 6-6-6-6v12z"></path>
            </svg>
          </div>
        </div>
        <!-- SELECTED: Shaving -->
        <div
          class="service-card-selected bg-midnight-surface p-6 rounded-custom flex justify-between items-center"
          data-purpose="service-item"
        >
          <div class="flex flex-col">
            <span class="text-gray-400 font-medium">Shaving</span>
          </div>
          <div class="flex items-center gap-3 text-right">
            <div class="flex flex-col">
              <span class="font-bold text-white text-lg">Thin Shaving</span>
              <span class="text-brand-amber font-bold">+ $4.50</span>
            </div>
            <svg
              class="text-brand-amber"
              fill="currentColor"
              height="18"
              viewbox="0 0 24 24"
              width="18"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="m9 18 6-6-6-6v12z"></path>
            </svg>
          </div>
        </div>
        <!-- UNSELECTED: Skin Care -->
        <div
          class="service-card-unselected bg-midnight-surface p-6 rounded-custom flex justify-between items-center"
          data-purpose="service-item"
        >
          <span class="text-gray-400 font-medium">Skin Care</span>
          <div class="flex items-center gap-3">
            <span class="font-bold text-white">12 types</span>
            <svg
              class="text-brand-amber"
              fill="currentColor"
              height="18"
              viewbox="0 0 24 24"
              width="18"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="m9 18 6-6-6-6v12z"></path>
            </svg>
          </div>
        </div>
        <!-- UNSELECTED: Hair Dryer -->
        <div
          class="service-card-unselected bg-midnight-surface p-6 rounded-custom flex justify-between items-center"
          data-purpose="service-item"
        >
          <span class="text-gray-400 font-medium">Hair Dryer</span>
          <div class="flex items-center gap-3">
            <span class="font-bold text-white">4 types</span>
            <svg
              class="text-brand-amber"
              fill="currentColor"
              height="18"
              viewbox="0 0 24 24"
              width="18"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="m9 18 6-6-6-6v12z"></path>
            </svg>
          </div>
        </div>
      </main>
      <!-- END: Services List -->
      <!-- BEGIN: Footer CTA -->
      <div
        class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-midnight-bg/80 backdrop-blur-lg border-t border-midnight-border px-6 pt-6 pb-8 safe-bottom"
        data-purpose="footer-action"
      >
        <button
          class="w-full bg-brand-violet hover:bg-violet-700 text-white font-bold py-5 rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2"
          id="book-now-button"
        >
          <span>Book Now - $16.00</span>
        </button>
      </div>
      <!-- END: Footer CTA -->
    </div>
    <!-- END: Mobile Container -->
  </body>
</html>
