<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Clipd - Fill Your Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#2a292f",
              "surface-container-lowest": "#0e0e13",
              "on-surface-variant": "#ccc3d8",
              "on-primary-container": "#ede0ff",
              "surface-variant": "#35343a",
              outline: "#958da1",
              "inverse-primary": "#732ee4",
              surface: "#131318",
              "outline-variant": "#4a4455",
              error: "#ffb4ab",
              "tertiary-fixed-dim": "#4edea3",
              "error-container": "#93000a",
              "tertiary-container": "#007650",
              "surface-bright": "#39383e",
              "surface-tint": "#d2bbff",
              "on-surface": "#e4e1e9",
              "inverse-surface": "#e4e1e9",
              tertiary: "#4edea3",
              "on-secondary": "#472a00",
              "on-secondary-container": "#5b3800",
              "surface-container": "#1f1f25",
              "on-error-container": "#ffdad6",
              "surface-container-highest": "#35343a",
              "on-primary-fixed-variant": "#5a00c6",
              "secondary-fixed-dim": "#ffb95f",
              "surface-dim": "#131318",
              "surface-container-low": "#1b1b20",
              "on-background": "#e4e1e9",
              "inverse-on-surface": "#303036",
              "on-tertiary-container": "#76ffc2",
              "secondary-fixed": "#ffddb8",
              "on-error": "#690005",
              "secondary-container": "#ee9800",
              "primary-fixed-dim": "#d2bbff",
              "on-tertiary": "#003824",
              secondary: "#ffb95f",
              "on-tertiary-fixed": "#002113",
              "tertiary-fixed": "#6ffbbe",
              background: "#131318",
              "on-tertiary-fixed-variant": "#005236",
              "on-primary": "#3f008e",
              "primary-fixed": "#eaddff",
              "primary-container": "#7c3aed",
              "on-secondary-fixed": "#2a1700",
              "on-secondary-fixed-variant": "#653e00",
              primary: "#d2bbff",
              "on-primary-fixed": "#25005a",
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              sm: "0.25rem",
              md: "0.75rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
            spacing: {
              "container-margin": "20px",
              gutter: "16px",
              "stack-sm": "8px",
              "stack-md": "16px",
              "stack-lg": "24px",
              "section-gap": "40px",
            },
            fontFamily: {
              headline: ["Inter"],
              display: ["Inter"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .glass-panel {
        background: rgba(26, 26, 36, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(124, 58, 237, 0.15);
      }
      .input-glow:focus-within {
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.4);
        border-color: #7c3aed;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container"
  >
    <header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface">
      <div
        class="flex items-center justify-between px-5 h-16 w-full max-w-7xl mx-auto"
      >
        <button
          class="text-primary dark:text-primary active:scale-95 duration-200 hover:bg-surface-bright/10 transition-colors p-2 rounded-full flex items-center justify-center"
        >
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 0"
            >arrow_back</span
          >
        </button>
        <h1
          class="text-headline-md font-extrabold text-on-surface dark:text-on-surface tracking-tight font-headline"
        >
          Fill Your Profile
        </h1>
        <div class="w-10"></div>
      </div>
    </header>
    <main
      class="flex-1 mt-16 px-container-margin pb-[100px] max-w-md mx-auto w-full"
    >
      <div class="flex justify-center mt-8 mb-10">
        <div
          class="relative w-32 h-32 rounded-full bg-surface-container-high border border-surface-variant flex items-center justify-center overflow-hidden group cursor-pointer"
        >
          <span
            class="material-symbols-outlined text-6xl text-on-surface-variant opacity-50 group-hover:opacity-75 transition-opacity"
            >person</span
          >
          <div
            class="absolute bottom-0 right-0 w-10 h-10 bg-secondary rounded-full flex items-center justify-center border-4 border-surface translate-x-1 translate-y-1 shadow-lg"
          >
            <span
              class="material-symbols-outlined text-on-secondary text-sm font-bold"
              >edit</span
            >
          </div>
        </div>
      </div>
      <form class="space-y-4">
        <div
          class="relative bg-[#111118] border border-[#2a292f] rounded-[12px] input-glow transition-all duration-300 flex items-center px-4 h-14"
        >
          <input
            class="w-full bg-transparent border-none outline-none text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0"
            placeholder="Full Name"
            type="text"
          />
        </div>
        <div
          class="relative bg-[#111118] border border-[#2a292f] rounded-[12px] input-glow transition-all duration-300 flex items-center px-4 h-14"
        >
          <input
            class="w-full bg-transparent border-none outline-none text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0"
            placeholder="Nickname"
            type="text"
          />
        </div>
        <div
          class="relative bg-[#111118] border border-[#2a292f] rounded-[12px] input-glow transition-all duration-300 flex items-center px-4 h-14"
        >
          <input
            class="w-full bg-transparent border-none outline-none text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0"
            onblur="this.type = 'text'"
            onfocus="this.type = 'date'"
            placeholder="Date of Birth"
            type="text"
          />
          <span
            class="material-symbols-outlined text-outline-variant ml-2 pointer-events-none"
            >calendar_month</span
          >
        </div>
        <div
          class="relative bg-[#111118] border border-[#2a292f] rounded-[12px] input-glow transition-all duration-300 flex items-center px-4 h-14"
        >
          <input
            class="w-full bg-transparent border-none outline-none text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0"
            placeholder="Email"
            type="email"
          />
          <span
            class="material-symbols-outlined text-outline-variant ml-2 pointer-events-none"
            >mail</span
          >
        </div>
        <div
          class="relative bg-[#111118] border border-[#2a292f] rounded-[12px] input-glow transition-all duration-300 flex items-center px-4 h-14"
        >
          <div
            class="flex items-center gap-2 border-r border-[#2a292f] pr-3 mr-3 cursor-pointer"
          >
            <span class="text-xl leading-none">🇺🇸</span>
            <span class="material-symbols-outlined text-outline-variant text-sm"
              >expand_more</span
            >
          </div>
          <input
            class="w-full bg-transparent border-none outline-none text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0"
            placeholder="Phone Number"
            type="tel"
          />
        </div>
        <div
          class="relative bg-[#111118] border border-[#2a292f] rounded-[12px] input-glow transition-all duration-300 flex items-center px-4 h-14 cursor-pointer"
        >
          <select
            class="w-full bg-transparent border-none outline-none text-body-md text-on-surface focus:ring-0 p-0 appearance-none cursor-pointer"
          >
            <option
              class="text-outline-variant bg-surface-container"
              disabled=""
              selected=""
              value=""
            >
              Gender
            </option>
            <option class="bg-surface-container" value="male">Male</option>
            <option class="bg-surface-container" value="female">Female</option>
            <option class="bg-surface-container" value="other">Other</option>
            <option class="bg-surface-container" value="prefer_not">
              Prefer not to say
            </option>
          </select>
          <span
            class="material-symbols-outlined text-outline-variant ml-2 pointer-events-none absolute right-4"
            >expand_more</span
          >
        </div>
      </form>
    </main>
    <div
      class="fixed bottom-0 w-full z-50 p-container-margin pb-8 bg-gradient-to-t from-surface to-transparent"
    >
      <div class="max-w-md mx-auto">
        <button
          class="w-full h-14 bg-primary-container text-on-primary-container font-label text-label-md font-bold rounded-full hover:bg-inverse-primary transition-all duration-300 active:scale-95 shadow-[0_4px_20px_rgba(124,58,237,0.3)]"
        >
          Continue
        </button>
      </div>
    </div>
  </body>
</html>
